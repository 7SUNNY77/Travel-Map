<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Travel Globe</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/globe.gl@2.33.0/dist/globe.gl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <!-- ═══ Auth Screen ═══ -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-logo">
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="17" stroke="currentColor" stroke-width="1.8"/><ellipse cx="20" cy="20" rx="8" ry="17" stroke="currentColor" stroke-width="1.8"/><line x1="3" y1="14" x2="37" y2="14" stroke="currentColor" stroke-width="1.2"/><line x1="3" y1="26" x2="37" y2="26" stroke="currentColor" stroke-width="1.2"/></svg>
        <span>Travel Globe</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <h2>Вход</h2>
        <div class="form-group">
          <input type="text" class="form-input" id="loginUsername" placeholder="Логин" autocomplete="username" required />
        </div>
        <div class="form-group">
          <input type="password" class="form-input" id="loginPassword" placeholder="Пароль" autocomplete="current-password" required />
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary btn-full">Войти</button>
        <p class="auth-switch">Нет аккаунта? <a href="#" id="showRegister">Зарегистрироваться</a></p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form" style="display:none">
        <h2>Регистрация</h2>
        <div class="form-group">
          <input type="text" class="form-input" id="regUsername" placeholder="Логин (от 3 символов)" autocomplete="username" required minlength="3" />
        </div>
        <div class="form-group">
          <input type="password" class="form-input" id="regPassword" placeholder="Пароль (от 4 символов)" autocomplete="new-password" required minlength="4" />
        </div>
        <div class="form-error" id="regError"></div>
        <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
        <p class="auth-switch">Уже есть аккаунт? <a href="#" id="showLogin">Войти</a></p>
      </form>
    </div>
  </div>

  <!-- ═══ Main App (hidden until auth) ═══ -->
  <div class="app" id="mainApp" style="display:none">

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="logo">
        <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.5"/><ellipse cx="14" cy="14" rx="6" ry="12" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="10" x2="26" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="18" x2="26" y2="18" stroke="currentColor" stroke-width="1.2"/></svg>
        <span id="appTitle">Travel Globe</span>
      </div>
      <div class="top-right">
        <div class="stats-pill" id="statsPill">
          <span id="statsCountries">0 стран</span>
          <span id="statsCities">0 городов</span>
        </div>
        <button class="menu-btn" id="menuBtn" aria-label="Меню">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <!-- Navigation Menu (iOS Glass) -->
    <div class="nav-overlay" id="navOverlay"></div>
    <nav class="nav-menu" id="navMenu">
      <div class="nav-user" id="navUser">—</div>
      <button class="nav-item active" data-tab="globe">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="4" ry="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
        3D Глобус
      </button>
      <button class="nav-item" data-tab="map2d">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        2D Карта
      </button>
      <button class="nav-item" data-tab="list">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>
        Мои страны
      </button>
      <button class="nav-item nav-admin" data-tab="admin" id="navAdminBtn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.2.65.77 1.1 1.45 1.1H21a2 2 0 110 4h-.09c-.68 0-1.25.45-1.45 1.1z"/></svg>
        Админ-панель
      </button>
      <div class="nav-spacer"></div>
      <button class="nav-item nav-logout" id="btnLogout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Выйти
      </button>
    </nav>

    <!-- Tab: 3D Globe -->
    <div class="tab-content active" id="tabGlobe">
      <div id="globe-container"></div>
      <div class="hint-badge" id="hintBadge">Нажмите на маркер страны</div>
    </div>

    <!-- Tab: 2D Map -->
    <div class="tab-content" id="tabMap2d">
      <div id="map-container"></div>
      <div class="map-controls">
        <button class="map-toggle-btn active" data-style="grayscale">Минимализм</button>
        <button class="map-toggle-btn" data-style="satellite">Спутник</button>
      </div>
    </div>

    <!-- Tab: Countries List -->
    <div class="tab-content" id="tabList">
      <div class="list-view">
        <div class="list-header">
          <h2>Мои страны</h2>
          <div class="search-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Поиск..." />
          </div>
        </div>
        <div class="list-cards" id="countriesList"></div>
      </div>
    </div>

    <!-- Tab: Admin -->
    <div class="tab-content" id="tabAdmin">
      <div class="list-view">
        <div class="list-header">
          <h2>Админ-панель</h2>
          <div class="admin-stats" id="adminStats"></div>
        </div>
        <div class="list-cards" id="adminUsersList"></div>
      </div>
    </div>

    <!-- FAB -->
    <button class="fab" id="fabAdd" title="Добавить поездку">＋</button>

    <!-- Trip Detail Sheet -->
    <div class="sheet-overlay" id="sheetOverlay"></div>
    <div class="sheet" id="tripSheet">
      <div class="sheet-header">
        <h2 id="sheetTitle">—</h2>
        <button class="btn-close-sheet" id="btnCloseSheet">✕</button>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
    </div>

    <!-- Trip Form Sheet -->
    <div class="sheet-overlay" id="formOverlay"></div>
    <div class="sheet" id="formSheet">
      <div class="sheet-header">
        <h2 id="formSheetTitle">Добавить поездку</h2>
        <button class="btn-close-sheet" id="btnCloseForm">✕</button>
      </div>
      <div class="sheet-body" id="formSheetBody"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <img id="lightboxImg" src="" alt="Фото" />
    </div>
  </div>

  <script src="/static/js/countries-data.js"></script>
  <script src="/static/js/app.js"></script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
</html>
